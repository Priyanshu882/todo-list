<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do-List</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="to-do-container">
        <div class="heading-container">
            <h2>To Do List</h2>
            <img src="images/to-do-list-checklist-3d-icon-png.png" alt="to-do-icon">
        </div>
       
        <div class="add-to-do-continer">
            <h3>Add To Do</h3>
            <div class="add-to-do">
                <input type="text" name="" id="" class="todoinput" required placeholder="Add your To Do for Today... 😎">
            </div>
            <button class="add-btn">Add</button>
        </div>
        <div class="to-do-list-main">
            <div class="emptyList">
                What's on your mind today....
            </div>

                    <img src="images/delete.png" alt="delete-option" class="list-img delete">
                    <img src="images/done.png" alt="mark-complete" class="list-img done">
